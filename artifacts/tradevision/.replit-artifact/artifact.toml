kind = "web"
previewPath = "/"
title = "TradeVision AI"
version = "1.0.0"
id = "artifacts/tradevision"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18792

[services.development]
run = "pnpm --filter @workspace/tradevision run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tradevision", "run", "build" ]
publicDir = "artifacts/tradevision/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18792"
BASE_PATH = "/"
